robot2:
  amcl:
    ros__parameters:
      use_sim_time: True
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.1
      alpha4: 0.1
      alpha5: 0.05
      base_frame_id: "robot2/base_footprint"
      global_frame_id: "map"
      odom_frame_id: "robot2/odom"
      scan_topic: scan
      laser_model_type: "likelihood_field"
      max_beams: 60
      max_particles: 5000
      min_particles: 1000
      robot_model_type: "nav2_amcl::DifferentialMotionModel"
      transform_tolerance: 2.0
      update_min_a: 0.05
      update_min_d: 0.05
      z_hit: 0.5
      z_max: 0.05
      z_rand: 0.5
      z_short: 0.05
      laser_max_range: 20.0
      laser_min_range: -1.0
      sigma_hit: 0.3
      lambda_short: 0.1
      laser_likelihood_max_dist: 3.0
      tf_broadcast: true
      beam_skip_distance: 0.5
      beam_skip_error_threshold: 0.9
      beam_skip_threshold: 0.3
      do_beamskip: false
      pf_err: 0.05
      pf_z: 0.99
      recovery_alpha_fast: 0.1
      recovery_alpha_slow: 0.001
      resample_interval: 1
      save_pose_rate: 0.5
      set_initial_pose: true
      initial_pose:
        x: 0.0
        y: 0.0
        z: 0.0
        yaw: 0.0
  
  bt_navigator:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: robot2/base_link
      odom_topic: odom
      bt_loop_duration: 10
      default_server_timeout: 20
      navigate_to_pose:
        plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      navigate_through_poses:
        plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

  controller_server:
    ros__parameters:
      use_sim_time: True
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.001
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.5
      progress_checker_plugins: ["progress_checker"]
      goal_checker_plugins: ["general_goal_checker"]
      controller_plugins: ["FollowPath"]
      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0
      general_goal_checker:
        stateful: True
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 0.5
      FollowPath:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
        desired_linear_vel: 0.5
        lookahead_dist: 0.6
        min_lookahead_dist: 0.2
        max_lookahead_dist: 0.8
        lookahead_time: 1.5
        rotate_to_heading_angular_vel: 1.0
        transform_tolerance: 0.1
        use_velocity_scaled_lookahead_dist: false
        min_approach_linear_velocity: 0.05
        approach_velocity_scaling_dist: 1.0
        use_collision_detection: true
        max_allowed_time_to_collision_up_to_carrot: 2.0
        use_regulated_linear_velocity_scaling: true
        use_fixed_curvature_lookahead: false
        curvature_reg_k: 2.5
        use_cost_regulated_linear_velocity_scaling: false
        regulated_linear_scaling_min_radius: 0.9
        regulated_linear_scaling_min_speed: 0.25
        use_rotate_to_heading: true
        allow_reversing: false
        rotate_to_heading_min_angle: 1.0
        max_angular_accel: 3.2
        max_robot_pose_search_dist: 10.0
  
  local_costmap:
    local_costmap:
      ros__parameters:
        update_frequency: 10.0
        publish_frequency: 2.0
        transform_tolerance: 1.0
        global_frame: map
        robot_base_frame: robot2/base_link
        use_sim_time: True
        rolling_window: true
        width: 8
        height: 8
        resolution: 0.05
        robot_radius: 0.27
        plugins: ["obstacle_layer", "inflation_layer"]
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 5.0
          inflation_radius: 0.60
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /robot2/scan
            sensor_frame: ""
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 5.5
            raytrace_min_range: 0.0
            obstacle_max_range: 5.0
            obstacle_min_range: 0.0
            expected_update_rate: 0.0
        always_send_full_costmap: True
  
  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: map
        robot_base_frame: robot2/base_link
        use_sim_time: True
        robot_radius: 0.27
        resolution: 0.05
        track_unknown_space: false
        plugins: ["static_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.0
            obstacle_max_range: 2.5
            obstacle_min_range: 0.0
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 5.0
          inflation_radius:: 0.60
        always_send_full_costmap: True
  
  map_server:
    ros__parameters:
      use_sim_time: True
      yaml_filename: ""
  
  map_saver:
    ros__parameters:
      use_sim_time: True
      save_map_timeout: 5.0
      free_thresh_default: 0.25
      occupied_thresh_default: 0.65
      map_subscribe_transient_local: True
  
  planner_server:
    ros__parameters:
      expected_planner_frequency: 20.0
      use_sim_time: True
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_navfn_planner::NavfnPlanner"
        tolerance: 2.0
        use_astar: true
        allow_unknown: true
  
  smoother_server:
    ros__parameters:
      use_sim_time: True
      smoother_plugins: ["simple_smoother"]
      simple_smoother:
        plugin: "nav2_smoother::SimpleSmoother"
        tolerance: 1.0e-10
        max_its: 1000
        do_refinement: True
  
  behavior_server:
    ros__parameters:
      costmap_topic: local_costmap/costmap_raw
      footprint_topic: local_costmap/published_footprint
      cycle_frequency: 10.0
      behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
      spin:
        plugin: "nav2_behaviors::Spin"
        simulate_ahead_time: 2.0
      backup:
        plugin: "nav2_behaviors::BackUp"
      drive_on_heading:
        plugin: "nav2_behaviors::DriveOnHeading"
      wait:
        plugin: "nav2_behaviors::Wait"
      global_frame: robot2/odom
      robot_base_frame: robot2/base_link
      transform_tolerance: 0.1
      use_sim_time: true
      simulate_ahead_time: 2.0
      max_rotational_vel: 1.0
      min_rotational_vel: 0.4
      rotational_acc_lim: 3.2
  
  waypoint_follower:
    ros__parameters:
      use_sim_time: True
      loop_rate: 20
      stop_on_failure: false
      waypoint_task_executor_plugin: "wait_at_waypoint"
      wait_at_waypoint:
        plugin: "nav2_waypoint_follower::WaitAtWaypoint"
        enabled: True
        waypoint_pause_duration: 200
  
  velocity_smoother:
    ros__parameters:
      use_sim_time: True
      smoothing_frequency: 20.0
      scale_velocities: False
      feedback: "OPEN_LOOP"
      max_velocity: [0.5, 0.0, 2.0]
      min_velocity: [-0.5, 0.0, -2.0]
      max_accel: [2.5, 0.0, 3.2]
      max_decel: [-2.5, 0.0, -3.2]
      odom_topic: "odom"
      odom_duration: 0.1
      deadband_velocity: [0.0, 0.0, 0.0]
      velocity_timeout: 1.0
